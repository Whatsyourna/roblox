<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Roblox Joiner</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; color: white; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <h2>Đang chuyển hướng đến Roblox...</h2>
        <p>Nếu ứng dụng không tự mở, <a href="#" id="manual-link" style="color: #3498db;">nhấn vào đây</a>.</p>
    </div>

    <script>
        function joinGame() {
            // Lấy các tham số từ URL (ví dụ: ?placeId=123&gameInstanceId=abc)
            const urlParams = new URLSearchParams(window.location.search);
            const placeId = urlParams.get('placeId');
            const gameInstanceId = urlParams.get('gameInstanceId');

            if (placeId && gameInstanceId) {
                // Tạo link giao thức Roblox
                const robloxLink = `roblox://experiences/start?placeId=${placeId}&gameInstanceId=${gameInstanceId}`;
                
                // Cập nhật link dự phòng
                document.getElementById('manual-link').href = robloxLink;

                // Tự động chuyển hướng
                window.location.href = robloxLink;
            } else {
                document.body.innerHTML = "<h2>Thiếu tham số PlaceID hoặc GameInstanceID!</h2>";
            }
        }

        // Chạy hàm khi trang load xong
        window.onload = joinGame;
    </script>
</body>
</html>
